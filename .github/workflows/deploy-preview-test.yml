name: Deploy Preview TEST
on:
    workflow_run:
      workflows: ['Lint PR']
      types:
        - completed

jobs:
    deploy-to-s3:
      runs-on: ubuntu-latest
      steps:
        - uses: actions/checkout@v4
  
        - name: Download dist-build artifact
          uses: dawidd6/action-download-artifact@v9
          with:
            workflow: 'Build'
            workflow_conclusion: success
            github_token: ${{ secrets.GITHUB_TOKEN }}
            run_id: ${{ github.event.workflow_run.id }}
            run_number: ${{ github.event.workflow_run.run_number }}
            name: dist-build
            path: .
  
        - name: Download dist-storybook artifact
          uses: dawidd6/action-download-artifact@v9
          with:
            workflow: 'Build'
            workflow_conclusion: success
            github_token: ${{ secrets.GITHUB_TOKEN }}
            run_id: ${{ github.event.workflow_run.id }}
            run_number: ${{ github.event.workflow_run.run_number }}
            name: dist-storybook
            path: storybook
  
        - name: Download pr number
          uses: dawidd6/action-download-artifact@v9
          with:
            workflow: 'Build'
            workflow_conclusion: success
            github_token: ${{ secrets.GITHUB_TOKEN }}
            run_id: ${{ github.event.workflow_run.id }}
            run_number: ${{ github.event.workflow_run.run_number }}
            name: pr_number
            path: .
  
        - name: Read PR number
          id: read-pr
          run: |
            pr_number=$(cat pr_number)
            echo "PR_NUMBER=${pr_number}" >> $GITHUB_ENV
  
        - uses: shallwefootball/s3-upload-action@master
          name: Upload preview to S3
          if: always()
          id: s3-trace
          continue-on-error: true
          with:
            aws_key_id: ${{ secrets.AWS_KEY_ID }}
            aws_secret_access_key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
            aws_bucket: noam-gaash.co.il
            source_dir: . # Upload the root directory
            destination_dir: ${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}
  
        - name: find comment
          uses: peter-evans/find-comment@v3
          if: env.PR_NUMBER
          id: fc
          with:
            issue-number: ${{ env.PR_NUMBER }}
            comment-author: 'github-actions[bot]'
            body-includes: 'Preview'
  
        - name: Debug workflow version
          run: |
            echo "Current workflow content:"
            cat $GITHUB_WORKSPACE/.github/workflows/deploy-preview-test.yml
            echo "---"
            echo "Workflow run ID: ${{ github.event.workflow_run.id }}"
            echo "Run number: ${{ github.event.workflow_run.run_number }}"
  
        - name: update comment
          uses: peter-evans/create-or-update-comment@v4
          if: steps.fc.outputs.comment-id
          with:
            comment-id: ${{ steps.fc.outputs.comment-id }}
            edit-mode: replace
            body: |
              [TEST WORKFLOW]
              Last updated: ${{ github.event.workflow_run.updated_at }}
              Preview: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/index.html
              Preview Storybook: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/storybook/index.html
              Test: 1234
  
        - name: create comment
          uses: peter-evans/create-or-update-comment@v4
          if: steps.fc.outputs.comment-id == ''
          with:
            issue-number: ${{ env.PR_NUMBER }}
            body: |
              [TEST WORKFLOW]
              Preview: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/index.html
              Preview Storybook: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/storybook/index.html
              Test Report (if available): https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/test-results/index.html
  