name: Code coverage

# Runs the full test suite offline (--network none) with istanbul coverage
# (VITE_COVERAGE) and reports to Coveralls.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read
  actions: write

env:
  SHA: ${{ github.event.pull_request.head.sha || github.sha }}

jobs:
  test-with-coverage:
    name: Test with Coverage
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Build offline test image
        run: docker build -t open-bus-offline-test -f scripts/Dockerfile.offline-test .
      - name: Run tests offline, with coverage
        # Vite dev runs inside the container on :3000 (Playwright's webServer),
        # instrumented by VITE_COVERAGE; the Playwright collector writes raw
        # istanbul data to /app/.nyc_output, then nyc emits coverage/lcov.info.
        # --network none proves every external call is mocked.
        run: |
          mkdir -p coverage
          docker run --rm \
            --network none \
            -e CI=true \
            -e TZ=Asia/Jerusalem \
            -e VITE_COVERAGE=true \
            -v "$PWD/coverage:/app/coverage" \
            open-bus-offline-test \
            sh -c "npm test && nyc report --reporter=lcovonly"
      - name: Normalize coverage paths to repo-relative
        # lcov is produced with in-container paths (/app/src/...); strip the /app
        # prefix so Coveralls matches them against the repo tree.
        if: always()
        run: |
          if [ -f coverage/lcov.info ]; then
            sed -i 's#SF:/app/#SF:#g' coverage/lcov.info
          fi
      - name: Upload to Coveralls
        if: always()
        continue-on-error: true
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
