name: Offline Tests

on:
  pull_request:

permissions:
  contents: read

jobs:
  offline-tests:
    name: Offline Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: 'npm'
      - name: Run offline tests
        run: npm run test:offline
