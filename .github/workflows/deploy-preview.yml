name: Deploy Preview

on:
  workflow_run:
    workflows: ['Build']
    types:
      - completed

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  deploy-to-s3:
    name: Deploy to S3
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Download dist-build artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: 'Build'
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          run_number: ${{ github.event.workflow_run.run_number }}
          name: dist-build
          path: .

      - name: Download dist-storybook artifact
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: 'Build'
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          run_number: ${{ github.event.workflow_run.run_number }}
          name: dist-storybook
          path: storybook

      - name: Download pr number
        uses: dawidd6/action-download-artifact@v21
        with:
          workflow: 'Build'
          workflow_conclusion: success
          github_token: ${{ secrets.GITHUB_TOKEN }}
          run_id: ${{ github.event.workflow_run.id }}
          run_number: ${{ github.event.workflow_run.run_number }}
          name: pr_number
          path: .

      - name: Read PR number
        id: read-pr
        run: |
          pr_number=$(cat pr_number | tr -d '\n' | grep -E '^[0-9]+$' || echo "")
          if [ -z "$pr_number" ]; then
            echo "Error: Invalid PR number" >&2
            exit 1
          fi
          echo "PR_NUMBER=${pr_number}" >> $GITHUB_ENV

      - name: Upload preview to S3
        if: always()
        continue-on-error: true
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: us-east-1
        run: aws s3 cp . 's3://noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}' --recursive --acl public-read --only-show-errors

      - name: find comment
        uses: peter-evans/find-comment@v4
        if: env.PR_NUMBER
        id: fc
        with:
          issue-number: ${{ env.PR_NUMBER }}
          comment-author: 'github-actions[bot]'
          body-includes: 'Preview'

      - name: update comment
        uses: peter-evans/create-or-update-comment@v5
        if: steps.fc.outputs.comment-id
        with:
          comment-id: ${{ steps.fc.outputs.comment-id }}
          edit-mode: replace
          body: |
            Preview: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/index.html
            Preview Storybook: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/storybook/index.html

      - name: create comment
        uses: peter-evans/create-or-update-comment@v5
        if: steps.fc.outputs.comment-id == ''
        with:
          issue-number: ${{ env.PR_NUMBER }}
          body: |
            Preview: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/index.html
            Preview Storybook: https://s3.amazonaws.com/noam-gaash.co.il/${{ github.event.workflow_run.id }}/open-bus/${{ github.event.workflow_run.run_number }}/storybook/index.html
