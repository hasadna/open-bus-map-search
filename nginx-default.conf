server {
    listen 80;
    server_name localhost;

    # Storybook (built into dist/storybook, served here too). Its CSP matches the app
    # block below except where Storybook differs: script-src-elem 'unsafe-inline' for the
    # static bootstrap inline <script>s in its built HTML, and no GA/GTM hosts (Storybook
    # runs no analytics). Declared before `location /` so it matches first. nginx does not
    # inherit add_header into a location that defines its own, so every header is repeated.
    location /storybook/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /storybook/index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection 0 always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # connect-src: *.hasadna.org.il lets MSW-mocked stories issue their API fetches
        # (CSP is checked before the service worker can intercept). img-src/frame-src
        # mirror the app so map and YouTube stories render their tiles and embeds.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self'; script-src-elem 'self' 'unsafe-inline'; style-src 'self'; style-src-elem 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.openstreetmap.fr https://*.openstreetmap.org; connect-src 'self' https://*.hasadna.org.il; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:;" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;

        # Add security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        # X-XSS-Protection is deprecated; modern browsers ignore it and OWASP recommends disabling it.
        add_header X-XSS-Protection 0 always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # CSP per directive:
        # - script-src: no 'unsafe-inline'/'unsafe-eval' — the built index.html has no inline scripts;
        #   google-analytics/googletagmanager load the analytics scripts.
        # - style-src-elem 'unsafe-inline': MUI/emotion and styled-components inject runtime <style>
        #   elements. style-src itself omits 'unsafe-inline', so inline style="" attributes are blocked
        #   (the app sets none — React style={{}} writes via the CSSOM). 'self' stays on style-src-elem
        #   for the bundled /assets/*.css <link>; granular style-src-* directives do not inherit from style-src.
        # - img-src: openstreetmap for Leaflet tiles, google-analytics for react-ga4 beacon pixels.
        # - connect-src: *.hasadna.org.il for the stride/backend APIs, google-analytics/googletagmanager for analytics.
        # - frame-src: youtube(-nocookie).com for embedded instruction videos.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self'; style-src-elem 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.openstreetmap.fr https://*.openstreetmap.org https://www.google-analytics.com; connect-src 'self' https://*.hasadna.org.il https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:;" always;

    }
}
