server {
    listen 80;
    server_name localhost;

    # Storybook is built into dist/storybook and served from here too. Its
    # runtime requires script-src 'unsafe-eval'/'unsafe-inline', so it gets its
    # own relaxed CSP scoped to /storybook/ — never weakening the app policy
    # below. Storybook is a component gallery with no user data, so the looser
    # policy is contained. Must be declared before `location /` so it matches first.
    # NOTE: nginx does NOT inherit add_header into a location that defines its
    # own, so every security header is repeated here intentionally.
    location /storybook/ {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /storybook/index.html;

        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        add_header X-XSS-Protection 0 always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob:; worker-src 'self' blob:;" always;
    }

    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;

        # Add security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        # X-XSS-Protection is deprecated; modern browsers ignore it and OWASP recommends disabling it.
        add_header X-XSS-Protection 0 always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # CSP tuned to the app's runtime needs:
        # - script-src has NO 'unsafe-inline'/'unsafe-eval': the built index.html ships no inline scripts.
        # - style-src 'unsafe-inline': MUI/emotion, styled-components and antd inject runtime <style>/style= .
        # - img-src openstreetmap: Leaflet map tiles are <img> from tile-*.openstreetmap.fr/.org .
        # - connect-src google-analytics: react-ga4 beacons; *.hasadna.org.il for the stride/backend APIs.
        # - frame-src youtube: instruction videos are embedded as youtube(-nocookie).com iframes.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.openstreetmap.fr https://*.openstreetmap.org https://www.google-analytics.com; connect-src 'self' https://*.hasadna.org.il https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:;" always;

    }
}
