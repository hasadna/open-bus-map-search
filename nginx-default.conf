server {
    listen 80;
    server_name localhost;
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        try_files $uri /index.html;

        # Add security headers
        add_header X-Content-Type-Options nosniff always;
        add_header X-Frame-Options SAMEORIGIN always;
        # X-XSS-Protection is deprecated; modern browsers ignore it and OWASP recommends disabling it.
        add_header X-XSS-Protection 0 always;
        add_header Referrer-Policy strict-origin-when-cross-origin always;
        # CSP tuned to the app's runtime needs:
        # - style-src 'unsafe-inline': MUI/emotion, styled-components and antd inject runtime <style>/style= .
        # - img-src openstreetmap: Leaflet map tiles are <img> from tile-*.openstreetmap.fr/.org .
        # - connect-src google-analytics: react-ga4 beacons; *.hasadna.org.il for the stride/backend APIs.
        # - fonts are local (Heebo .ttf) so font-src is just 'self'.
        # - frame-src 'self': Storybook embeds its preview as a same-origin <iframe src="iframe.html">; 'self' must stay or the iframe is CSP-blocked.
        # - frame-src youtube: instruction videos are embedded as youtube(-nocookie).com iframes.
        add_header Content-Security-Policy "default-src 'self'; script-src 'self' https://www.google-analytics.com https://www.googletagmanager.com; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https://*.openstreetmap.fr https://*.openstreetmap.org https://www.google-analytics.com; font-src 'self'; connect-src 'self' https://*.hasadna.org.il https://www.google-analytics.com https://region1.google-analytics.com https://www.googletagmanager.com; frame-src 'self' https://www.youtube.com https://www.youtube-nocookie.com; worker-src 'self' blob:;" always;

    }
}
