sonar.projectKey=hasadna_open-bus-map-search
sonar.organization=hasadna
sonar.projectName=open-bus-map-search

sonar.sources=src
sonar.tests=src
sonar.test.inclusions=**/*.test.ts,**/*.test.tsx,**/*.spec.ts
sonar.exclusions=**/node_modules/**,**/*.stories.tsx

# No coverage report is uploaded, so exclude everything from coverage.
# Otherwise SonarCloud counts every executable line as uncovered and reports 0%.
sonar.coverage.exclusions=**/*

sonar.sourceEncoding=UTF-8
